# application.properties — nello backend

# H2 datasource (file-based for dev)
spring.datasource.url=jdbc:h2:file:./nello;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# H2 console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

# JWT
jwt.secret=change-me-in-production-use-256-bit-random-value
jwt.expiry-minutes=60

# Magic link mock mode (true = no real email, token returned in response)
nello.mock=true

# Allowed email domain patterns (comma-separated regex)
nello.allowed-email-domains=.*

# Mail (configure for production)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# App base URL for magic-link construction
nello.app-base-url=http://localhost:5173

# DevTools — live reload
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
