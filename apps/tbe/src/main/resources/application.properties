# Spring datasource — SQLite
spring.datasource.url=jdbc:sqlite:./nello.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# JWT
jwt.secret=change-me-in-production-min-32-chars!!
jwt.expiry-minutes=60

# Magic link
magic-link.expiry-minutes=15

# Allowed email domains (comma-separated regexps)
allowed_email_domains_list=.*@emeal\\.nttdata\\.com

# Default admin user (used for initial setup only)
nello.admin.email=giovanni.giorgi@emeal.nttdata.com

# Mail (set to real SMTP in production; mock used in dev)
spring.mail.host=localhost
spring.mail.port=1025
nello.mail.from=nello@example.com
nello.mail.mock=true

# Frontend origin for CORS
nello.cors.allowed-origin=http://localhost:5173
